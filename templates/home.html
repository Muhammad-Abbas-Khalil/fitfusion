{% extends 'base.html' %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh]">
    <h1 class="text-4xl font-bold mb-6">Welcome to FitFusion</h1>
    <p class="text-lg text-gray-700 mb-6">Track your fitness and meals, get AI-powered coaching, and manage your progress privately.</p>
    <div class="flex gap-4">
        {% if not current_user.is_authenticated %}
            <a href="{{ url_for('login') }}" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg">Login</a>
            <a href="{{ url_for('register') }}" class="bg-gray-200 hover:bg-gray-300 text-blue-600 font-semibold py-2 px-6 rounded-lg">Register</a>
        {% else %}
            <a href="{{ url_for('dashboard') }}" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg">Go to Dashboard</a>
        {% endif %}
    </div>
</div>
{% endblock %}
