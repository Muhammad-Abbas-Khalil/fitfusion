{% extends 'base.html' %}
{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-100 to-green-50">
  <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-xl">
    <div class="flex flex-col items-center mb-4">
      <div class="text-4xl mb-2 text-blue-700">🤖</div>
      <h2 class="text-3xl font-bold text-center text-blue-700 mb-1">AI Fitness Coach</h2>
      <div class="text-center text-gray-500 mb-2">Your personal AI-powered trainer & nutritionist!</div>
    </div>

    <form method="post" class="flex flex-col gap-3" id="ai-form" autocomplete="off" onsubmit="showLoading()">
      <input type="text" name="question" id="question-input" required
        class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-400 shadow transition"
        placeholder="Ask anything... (e.g., Best protein for muscle gain?)">
      <button type="submit"
        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg shadow transition text-lg flex items-center justify-center gap-2">
        <span>Ask Coach</span>
        <svg id="loading-spinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
      </button>
    </form>

    {% if answer %}
      <div class="mt-8 bg-gradient-to-r from-green-50 to-blue-100 p-6 rounded-xl shadow-md animate-fade-in">
        <div class="flex items-center gap-2 mb-2">
          <div class="text-green-600 text-2xl">💡</div>
          <span class="text-lg font-semibold text-green-800">AI Coach Says:</span>
        </div>
        <div class="text-gray-700 text-base whitespace-pre-line leading-relaxed">{{ answer }}</div>
      </div>
    {% endif %}

    <div class="mt-8 text-center text-gray-400 italic text-sm">
      “The secret of getting ahead is getting started.”<br>— Mark Twain
    </div>
  </div>
</div>
<style>
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
.animate-fade-in { animation: fade-in 0.7s; }
</style>
<script>
function showLoading() {
  document.getElementById('loading-spinner').classList.remove('hidden');
}
</script>
{% endblock %}
