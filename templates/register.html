{% extends 'base.html' %}
{% block content %}
<div class="flex items-center justify-center min-h-screen">
    <form method="post" class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center">Create Profile</h2>
        <label class="block mb-2 font-semibold">Name</label>
        <input type="text" name="name" required class="w-full mb-4 px-3 py-2 border rounded-lg">

        <label class="block mb-2 font-semibold">Email</label>
        <input type="email" name="email" required class="w-full mb-4 px-3 py-2 border rounded-lg">

        <label class="block mb-2 font-semibold">Password</label>
        <input type="password" name="password" required class="w-full mb-4 px-3 py-2 border rounded-lg">

        <label class="block mb-2 font-semibold">Age</label>
        <input type="number" name="age" required class="w-full mb-4 px-3 py-2 border rounded-lg">

        <label class="block mb-2 font-semibold">Weight (kg)</label>
        <input type="number" step="0.1" name="weight" required class="w-full mb-4 px-3 py-2 border rounded-lg">

        <label class="block mb-2 font-semibold">Height (cm)</label>
        <input type="number" step="0.1" name="height" required class="w-full mb-4 px-3 py-2 border rounded-lg">

        <label class="block mb-2 font-semibold">Fitness Goal</label>
        <select name="goal" required class="w-full mb-4 px-3 py-2 border rounded-lg">
            <option value="Weight Loss">Weight Loss</option>
            <option value="Muscle Gain">Muscle Gain</option>
            <option value="General Fitness">General Fitness</option>
        </select>

        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700">Register</button>
        <div class="text-center mt-3">
            Already have an account? <a href="{{ url_for('login') }}" class="text-blue-600 hover:underline">Login</a>
        </div>
    </form>
</div>
{% endblock %}
